name: smart_driver_assistant
description: AI-powered smart driver assistant
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.2.7

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0

  # Sensors & Location
  geolocator: ^12.0.0
  sensors_plus: ^5.0.1
  permission_handler: ^11.3.1

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.1

  # Background Service
  flutter_background_service: ^5.0.10

  # Utils
  dio: ^5.7.0
  http: ^1.2.0
  connectivity_plus: ^6.0.5
  intl: ^0.19.0
  uuid: ^4.4.2
  equatable: ^2.0.5
  logger: ^2.4.0
  timezone: ^0.9.4

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4

  # UI
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.2.2
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
